# Redis configuration for ChatFlow Assignment 4
# Deploy to EC2 alongside consumer-v3
# Start with: redis6-server /path/to/redis.conf

# ── Persistence ───────────────────────────────────────────────────────────────
# AOF (Append Only File) — every write is logged to disk.
# On restart, Redis replays the AOF to restore stream data (pending messages
# that were published but not yet consumed survive a Redis process crash).
appendonly yes
appendfilename "appendonly.aof"

# fsync policy: "everysec" is a good balance — at most 1 second of data loss
# on crash, with minimal performance impact vs "always".
appendfsync everysec

# ── Network ───────────────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no

# ── Memory ───────────────────────────────────────────────────────────────────
# Cap at 2GB; evict nothing (streams must not be silently dropped).
# MAXLEN ~100k per stream (enforced by RedisPublisher) keeps actual usage well below this.
maxmemory 2gb
maxmemory-policy noeviction

# ── Stream defaults ───────────────────────────────────────────────────────────
# No global stream size limit — RedisPublisher enforces per-stream MAXLEN.